version: 2
updates:
  - package-ecosystem: "mix"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      elixir-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      rust-dependencies:
        patterns:
          - "*"

  # No cargo entry for /tauri: `tauri/Cargo.toml` has a path dependency on
  # `../deps/elixirkit/elixirkit_rs`, which lives in the gitignored Mix `deps/`
  # directory (fetched by `mix deps.get`, absent from Dependabot's checkout).
  # Dependabot must fetch every path dependency before evaluating updates, so
  # the whole entry errored on every run — an `ignore` can't skip a path dep.
  # The Rust NIF crates that research recommended watching are covered by the
  # `/` workspace entry above.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    groups:
      github-actions:
        patterns:
          - "*"
