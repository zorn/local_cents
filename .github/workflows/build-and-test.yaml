name: Build and Test

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - "*"

permissions:
  contents: read

# Cancel any in-progress instances of this workflow when this instance is triggered.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MIX_ENV: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/ex_automerge

      - name: Setup Elixir Project
        uses: ./.github/actions/elixir-setup
        with:
          build-flags: --all-warnings --warnings-as-errors
          # We fold a hash of the Rust NIF sources into cache-key so that any
          # change to native/ busts the Elixir _build cache. This is necessary
          # because Rustler copies the compiled .so into _build/test/priv/native/
          # during `mix compile`. If the Elixir _build cache is restored from a
          # run that predates (or skipped) the NIF compilation, the .so will be
          # missing at test time and all NIF calls will fail. Keeping this logic
          # here rather than inside elixir-setup/action.yaml keeps that action
          # free of Rust-specific concerns.
          cache-key: v2-${{ hashFiles('native/**/*.rs', 'native/**/Cargo.toml', 'native/**/Cargo.lock') }}

      - name: Run Tests
        run: mix test
